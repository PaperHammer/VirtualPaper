syntax = "proto3";
package VirtualPaper.Grpc.Service.StyleTransfer;

service Grpc_StyleTransferService {
  rpc StylizeWithProgress (StyleRequest) returns (stream ProgressEvent);
  rpc GetCapability (Empty) returns (CapabilityResponse);
}

message Empty {}

message StyleRequest {
  string input_path            = 1;
  string output_path           = 2;
  string style_name            = 3;
  int32  steps                 = 4;
  float  image_guidance_scale  = 5;
  float  guidance_scale        = 6;
}

message ProgressEvent {
  // 阶段
  string stage          = 1;  // "preparing" / "encoding" / "tiling" / "decoding" / "done" / "error"

  // tile 进度
  int32  current_tile   = 2;
  int32  total_tiles    = 3;

  // 每个 tile 内部的步骤进度（UNet 去噪步数）
  int32  current_step   = 4;
  int32  total_steps    = 5;

  // 时间信息（毫秒）
  int64  elapsed_ms     = 6;   // 已耗时
  int64  estimated_ms   = 7;   // 预计剩余时间

  string message        = 8;   // 可选文字说明
  string error_msg      = 9;
}

message CapabilityResponse {
  string backend         = 1;  // "cuda_full" / "cuda_offload" / "cpu" 等
  int32  vram_mb         = 2;
  int32  max_tile_size   = 3;
  bool   supports_lcm    = 4;
}
