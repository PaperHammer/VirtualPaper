name: Auto Sync and Publish
run-name: "[Auto] Publish | ${{ github.event.pull_request.head.ref }} -> main | ${{ github.event.pull_request.title }}"

on:
  pull_request:
    branches:
      - main
    types:
      - closed

concurrency:
  group: release-main
  cancel-in-progress: false  # 同一时间只允许一个构建，确保版本号不发生竞争

permissions:
  contents: write
  statuses: write

jobs:

  # ─────────────────────────────────────────────────────────────
  # Job 1: 准备阶段 - 记录 SHA、确定分支、计算新版本号
  # ─────────────────────────────────────────────────────────────
  prepare:
    name: Prepare - Version & Metadata
    runs-on: windows-latest
    if: |
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.title, '[skip ci]')
    outputs:
      source_branch: ${{ steps.branch_info.outputs.source_branch }}
      increment_type: ${{ steps.branch_info.outputs.increment_type }}
      current_version: ${{ steps.version.outputs.current_version }}
      new_version: ${{ steps.version.outputs.new_version }}
      new_version_text: ${{ steps.version.outputs.new_version_text }}
      current_version_text: ${{ steps.version.outputs.current_version_text }}
      main_sha: ${{ steps.shas.outputs.main_sha }}
      dev_sha: ${{ steps.shas.outputs.dev_sha }}
      bugfix_sha: ${{ steps.shas.outputs.bugfix_sha }}
      release_sha: ${{ steps.shas.outputs.release_sha }}
      pr_title: ${{ steps.pr_info.outputs.pr_title }}
      pr_body: ${{ steps.pr_info.outputs.pr_body }}
      has_plugin_update: ${{ steps.version.outputs.has_plugin_update }}
      update_plugins: ${{ steps.version.outputs.update_plugins }}
      build_number: ${{ steps.version.outputs.build_number }}
      release_tag: ${{ steps.version.outputs.release_tag }}

    steps:
    - name: Checkout with full history
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Record original branch SHAs
      id: shas
      shell: powershell
      run: |
        $mainSha = git rev-parse HEAD
        $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "main_sha=$mainSha`n", $utf8NoBom)
        Write-Host "main SHA: $mainSha"

        $devSha = git rev-parse origin/dev
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "dev_sha=$devSha`n", $utf8NoBom)
        Write-Host "dev SHA: $devSha"

        $bugfixSha = git rev-parse origin/bugfix
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "bugfix_sha=$bugfixSha`n", $utf8NoBom)
        Write-Host "bugfix SHA: $bugfixSha"

        $releaseSha = git rev-parse origin/release
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "release_sha=$releaseSha`n", $utf8NoBom)
        Write-Host "release SHA: $releaseSha"

    - name: Determine source branch and version increment
      id: branch_info
      shell: powershell
      env:
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      run: |
        $sourceBranch = $env:PR_HEAD_REF
        $incrementType = "patch"

        if ($sourceBranch -eq "release") {
            $incrementType = "feature"
            Write-Host "Source branch: release - incrementing minor version (feature update)"
        } elseif ($sourceBranch -eq "dev") {
            $incrementType = "minor"
            Write-Host "Source branch: dev - incrementing build version (daily update)"
        } elseif ($sourceBranch -eq "bugfix") {
            $incrementType = "patch"
            Write-Host "Source branch: bugfix - incrementing patch version"
        } else {
            Write-Host "Unknown source branch: $sourceBranch - defaulting to patch"
        }

        $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "source_branch=$sourceBranch`n", $utf8NoBom)
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "increment_type=$incrementType`n", $utf8NoBom)

    - name: Prepare release metadata
      id: version
      shell: powershell
      env:
        PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
      run: |
        $csprojPath = "src/VirtualPaper/VirtualPaper.csproj"
        $content = Get-Content $csprojPath -Raw
        $versionMatch = [regex]::Match($content, '<AssemblyVersion>(\d+)\.(\d+)\.(\d+)\.(\d+)</AssemblyVersion>')

        if (-not $versionMatch.Success) {
            Write-Error "Could not parse version from csproj file"
            exit 1
        }

        $major = [int]$versionMatch.Groups[1].Value
        $minor = [int]$versionMatch.Groups[2].Value
        $build = [int]$versionMatch.Groups[3].Value
        $revision = [int]$versionMatch.Groups[4].Value

        $currentVersion = "$major.$minor.$build.$revision"
        $currentVersionText = "${major}_${minor}_${build}_${revision}"

        # ── Detect plugin update labels ──────────────────────────────
        $labels = "$env:PR_LABELS" -split ',' | ForEach-Object { $_.Trim() }
        $isPluginUpdate = $false
        $plugins = @()

        if ($labels -contains "update-plugins") {
            $isPluginUpdate = $true
            $plugins = @("UI", "PlayerWeb", "ScrSaver", "ML", "Shaders")
        } else {
            if ($labels -contains "update-plugin-ui")         { $isPluginUpdate = $true; $plugins += "UI" }
            if ($labels -contains "update-plugin-playerweb")   { $isPluginUpdate = $true; $plugins += "PlayerWeb" }
            if ($labels -contains "update-plugin-scrsaver")    { $isPluginUpdate = $true; $plugins += "ScrSaver" }
            if ($labels -contains "update-plugin-ml")          { $isPluginUpdate = $true; $plugins += "ML" }
            if ($labels -contains "update-plugin-shaders")     { $isPluginUpdate = $true; $plugins += "Shaders" }
        }

        # ── Calculate version ────────────────────────────────────────
        if ($isPluginUpdate) {
            Write-Host "Plugin update ($($plugins -join ', ')) - version unchanged: $currentVersion"
        } else {
            Write-Host "Installer-only release - no plugin updates"
            $incrementType = "${{ steps.branch_info.outputs.increment_type }}"
            if ($incrementType -eq "feature") {
                $minor = $minor + 1      # 第2位 +1
                $build = 0               # 第3位 清零
                $revision = 0            # 第4位 清零
            } elseif ($incrementType -eq "minor") {
                $build = $build + 1      # 第3位 +1
                $revision = 0            # 第4位 清零
            } else {
                $revision = $revision + 1  # 第4位 +1
            }
        }

        $newVersion = "$major.$minor.$build.$revision"
        # 使用下划线分隔，避免各组件 >= 10 时产生歧义（如 0.10.0.0 → 01000 与 0.1.0.0.0 冲突）
        $newVersionText = "${major}_${minor}_${build}_${revision}"
        Write-Host "Version: $currentVersion -> $newVersion"

        # ── Generate build number: YYMM + R + DD + T + HHMM ─────────
        $now = Get-Date
        $buildNumber = $now.ToString("yyMM") + "R" + $now.ToString("dd") + "T" + $now.ToString("HHmm")
        Write-Host "Build number: $buildNumber"

        # ── Generate release tag ─────────────────────────────────────
        # Plugin 更新：tag 后缀用字母编码 build number，保证旧客户端正则兼容
        #   数字 0-9 → A-J，字母原样保留
        #   例：2607R01T2100 → CGAHRABTCBAA
        #   tag：v0.4.1.0pluginCGAHRABTCBAA → 正则后 0.4.1.0
        # 常规更新：tag 为 v{version}
        if ($isPluginUpdate) {
            $encoded = ($buildNumber.ToCharArray() | ForEach-Object {
                if ($_ -ge '0' -and $_ -le '9') { [char]([int][char]'A' + ([int]$_ - [int][char]'0')) } else { $_ }
            }) -join ''
            $releaseTag = "v${newVersion}plugin${encoded}"
        } else {
            $releaseTag = "v${newVersion}"
        }
        Write-Host "Release tag: $releaseTag"

        # ── Outputs ──────────────────────────────────────────────────
        $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "current_version=$currentVersion`n", $utf8NoBom)
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "current_version_text=$currentVersionText`n", $utf8NoBom)
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "new_version=$newVersion`n", $utf8NoBom)
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "new_version_text=$newVersionText`n", $utf8NoBom)
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "has_plugin_update=$($isPluginUpdate.ToString().ToLower())`n", $utf8NoBom)
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "update_plugins=$($plugins -join ';')`n", $utf8NoBom)
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "build_number=$buildNumber`n", $utf8NoBom)
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "release_tag=$releaseTag`n", $utf8NoBom)

    - name: Capture PR title and body
      id: pr_info
      shell: powershell
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BODY: ${{ github.event.pull_request.body }}
      run: |
        # PowerShell 5.1 的 >> 和 Out-File -Encoding utf8 均会写入 UTF-16 LE 或带 BOM 的 UTF-8
        # $GITHUB_OUTPUT 必须是无 BOM 的 UTF-8，使用 .NET API 显式指定
        $utf8NoBom = [System.Text.UTF8Encoding]::new($false)

        # PR title（单行）
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "pr_title=$env:PR_TITLE`n", $utf8NoBom)
        Write-Host "PR title: $env:PR_TITLE"

        # PR body（多行，heredoc delimiter 格式，完整保留换行和特殊字符）
        $delimiter = [System.Guid]::NewGuid().ToString("N")
        $body = $env:PR_BODY -replace "`r`n", "`n"   # 统一为 LF，避免 CRLF 写入 GITHUB_OUTPUT
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "pr_body<<$delimiter`n", $utf8NoBom)
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "$body`n", $utf8NoBom)
        [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "$delimiter`n", $utf8NoBom)
        Write-Host "PR body captured ($($body.Length) chars)"

  # ─────────────────────────────────────────────────────────────
  # Job 2: 编译 .NET Release
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build .NET Release
    runs-on: windows-latest
    needs: prepare

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj', 'src/**/*.props') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Patch AssemblyVersion in csproj (local only, not committed)
      shell: powershell
      run: |
        $csprojPath = "src/VirtualPaper/VirtualPaper.csproj"
        $content = Get-Content $csprojPath -Raw
        $newVersion = "${{ needs.prepare.outputs.new_version }}"
        $newContent = $content -replace '<AssemblyVersion>\d+\.\d+\.\d+\.\d+</AssemblyVersion>', "<AssemblyVersion>$newVersion</AssemblyVersion>"
        Set-Content $csprojPath -Value $newContent -NoNewline
        Write-Host "Patched AssemblyVersion to $newVersion (build-time only)"

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Rebuild solution
      run: msbuild src/VirtualPaper.sln /t:Rebuild /p:Configuration=Release /p:Platform="Any CPU" /restore /m

    - name: Validate Build Artifacts
      # 在产物就地校验：主 exe / Plugin exe / 核心 dll 存在且非空。
      # 通过后才上传 artifact，确保 package / smoke_test job 拿到的是健康的构建产物。
      env:
        RELEASE_BIN_DIR: ${{ github.workspace }}/src/VirtualPaper/bin/Release/net8.0-windows10.0.19041.0
      run: dotnet test src/VirtualPaper.ReleaseBuildData.Test/VirtualPaper.ReleaseBuildData.Test.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=release-build-tests.trx" --results-directory TestResults/ReleaseBuild
      shell: pwsh

    - name: Upload Validate Build Artifacts results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-release-build
        path: TestResults/ReleaseBuild/
        retention-days: 1

    - name: Upload build output
      uses: actions/upload-artifact@v4
      with:
        name: build-release-output
        path: src/
        retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # Job 3: 制作安装包（依赖 build 完成）
  # ─────────────────────────────────────────────────────────────
  package:
    name: Create Installer
    runs-on: windows-latest
    needs: [prepare, build]
    outputs:
      installer_name: ${{ steps.installer_info.outputs.installer_name }}
      installer_path: ${{ steps.installer_info.outputs.installer_path }}

    steps:
    # Step 1：checkout 拿到仓库根目录的全部文件，包含 InnoSetup/ 脚本和其他非编译产物。
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # Step 2：将 build job 的编译产物下载并覆盖到 src/。
    # 顺序不可颠倒：必须先 checkout（否则 InnoSetup/ 目录不存在），
    # 再用 artifact 覆盖 src/（用已打版本号的 Release 二进制替换源码目录下的旧产物）。
    - name: Download build output
      uses: actions/download-artifact@v4
      with:
        name: build-release-output
        path: src/

    - name: Install Inno Setup 6.7.1
      shell: powershell
      run: choco install innosetup --version=6.7.1 --no-progress -y

    - name: Patch version in InnoSetup script (local only, not committed)
      shell: powershell
      run: |
        $setupPath = "InnoSetup/setup.iss"
        $content = Get-Content $setupPath -Raw
        $newVersion = "${{ needs.prepare.outputs.new_version }}"
        $newVersionText = "${{ needs.prepare.outputs.new_version_text }}"
        $newContent = $content -replace '#define MyAppVersion "[\d\.]+"', "#define MyAppVersion `"$newVersion`""
        $newContent = $newContent -replace '#define MyAppVersionText "[\d_]+"', "#define MyAppVersionText `"$newVersionText`""
        Set-Content $setupPath -Value $newContent -NoNewline
        Write-Host "Patched InnoSetup version to $newVersion (build-time only)"

    - name: Download InnoDependencyInstaller
      shell: powershell
      run: |
        $url = "https://raw.githubusercontent.com/DomGries/InnoDependencyInstaller/master/CodeDependencies.iss"
        $dest = "InnoSetup\CodeDependencies.iss"
        Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
        Write-Host "[OK]" -ForegroundColor Green -NoNewline; Write-Host " CodeDependencies.iss downloaded"

    - name: Compile installer
      id: build_installer
      shell: powershell
      run: |
        $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
        if (-not (Test-Path $iscc)) {
            Write-Error "ISCC.exe not found at: $iscc"
            exit 1
        }
        & $iscc "InnoSetup\setup.iss" /O+
        if ($LASTEXITCODE -ne 0) {
            Write-Error "Inno Setup compilation failed (exit code $LASTEXITCODE)"
            exit 1
        }
        Write-Host "[OK]" -ForegroundColor Green -NoNewline; Write-Host " Installer compiled successfully"

    - name: Record installer info
      id: installer_info
      shell: powershell
      run: |
        $outputDir = "InnoSetup\Output"
        $installerFiles = Get-ChildItem -Path $outputDir -Filter "*.exe" -ErrorAction SilentlyContinue
        if ($installerFiles.Count -eq 0) {
            Write-Error "No installer found in output directory!"
            exit 1
        }
        $installerPath = $installerFiles[0].FullName
        Write-Host "[OK]" -ForegroundColor Green -NoNewline; Write-Host " Installer: $installerPath"
        Write-Output "installer_path=$installerPath" >> $env:GITHUB_OUTPUT
        Write-Output "installer_name=$($installerFiles[0].Name)" >> $env:GITHUB_OUTPUT

    - name: Generate SHA256 for installer
      shell: powershell
      run: |
        $hash = (Get-FileHash -Path "${{ steps.installer_info.outputs.installer_path }}" -Algorithm SHA256).Hash.ToLower()
        Set-Content -Path "${{ github.workspace }}\InnoSetup\Output\SHA256.txt" -Value $hash

    - name: Upload installer and SHA256 as artifact
      uses: actions/upload-artifact@v4
      with:
        name: VirtualPaper-Installer-v${{ needs.prepare.outputs.new_version }}
        path: |
          ${{ steps.installer_info.outputs.installer_path }}
          InnoSetup/Output/SHA256.txt
        retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Job 4: 安装包冒烟测试（静默安装 + 启动验证）
  #   阶段 1 - 等待 VirtualPaper.exe 自动拉起 UI（最多 10s）
  #   阶段 2 - 兜底：若未自动拉起则手动启动 UI
  #   阶段 3 - 再次尝试启动 UI，断言全局只有 1 个 UI 进程（单例守卫）
  #   阶段 4 - 验证 UI 无法在主进程未启动的情况下独立运行（应弹出错误 MessageBox 并阻塞）
  # ─────────────────────────────────────────────────────────────
  smoke_test:
    name: Smoke Test Installer
    runs-on: windows-latest
    needs: [prepare, package]

    steps:
    - name: Setup .NET (app runtime dependency)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Download installer artifact
      uses: actions/download-artifact@v4
      with:
        name: VirtualPaper-Installer-v${{ needs.prepare.outputs.new_version }}
        path: dist/

    - name: Silent install
      id: install
      shell: powershell
      run: |
        $installer = Get-ChildItem "dist\" -Filter "*.exe" | Select-Object -First 1
        if (-not $installer) {
            Write-Error "No installer found in dist\"
            exit 1
        }
        $installDir = "C:\VirtualPaperSmokeTest"
        Write-Host "Installer : $($installer.FullName)"
        Write-Host "Target dir: $installDir"
        $proc = Start-Process -FilePath $installer.FullName `
            -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=`"$installDir`"" `
            -Wait -PassThru
        if ($proc.ExitCode -ne 0) {
            Write-Error "Installer failed with exit code $($proc.ExitCode)"
            exit 1
        }
        Write-Output "install_dir=$installDir" >> $env:GITHUB_OUTPUT
        Write-Host "[OK] Installation completed"

    - name: Verify key files exist
      shell: powershell
      run: |
        $base = "${{ steps.install.outputs.install_dir }}"
        $required = @(
            "$base\VirtualPaper.exe",
            "$base\Plugins\UI\VirtualPaper.UI.exe"
        )
        $failed = $false
        foreach ($f in $required) {
            if (Test-Path $f) {
                Write-Host "[OK]      $f"
            } else {
                Write-Host "[MISSING] $f" -ForegroundColor Red
                $failed = $true
            }
        }
        if ($failed) {
            Write-Error "Required files missing after installation"
            exit 1
        }

    - name: Launch and verify UI process
      shell: powershell
      run: |
        $installDir = "${{ steps.install.outputs.install_dir }}"
        $mainExe = "$installDir\VirtualPaper.exe"
        $uiExe = "$installDir\Plugins\UI\VirtualPaper.UI.exe"

        # ── 阶段 1：启动主程序，等待其自动拉起 UI（最多 10s）──────────────
        Write-Host "Launching: $mainExe"
        $main = Start-Process -FilePath $mainExe -PassThru -ErrorAction Stop

        $uiProc = $null
        $autoWait = 10
        for ($i = 1; $i -le $autoWait; $i++) {
            Start-Sleep -Seconds 1
            $main.Refresh()
            if ($main.HasExited) {
                Write-Error "VirtualPaper.exe exited unexpectedly after ${i}s (exit code: $($main.ExitCode))"
                exit 1
            }
            $uiProc = Get-Process -Name "VirtualPaper.UI" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($uiProc) {
                Write-Host "[OK] VirtualPaper.UI auto-started after ${i}s (PID: $($uiProc.Id))"
                break
            }
            Write-Host "  [wait] ${i}s - waiting for VirtualPaper.UI to be auto-spawned..."
        }

        # ── 阶段 2：兜底 - 若未自动拉起则手动启动 UI ──────────────────────
        if (-not $uiProc) {
            Write-Host "[FALLBACK] UI not auto-spawned after ${autoWait}s, launching manually: $uiExe"
            Start-Process -FilePath $uiExe -ErrorAction Stop
            Start-Sleep -Seconds 5
            $uiProc = Get-Process -Name "VirtualPaper.UI" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $uiProc) {
                Write-Error "VirtualPaper.UI.exe failed to start even when launched manually"
                taskkill /F /T /PID $main.Id 2>$null
                exit 1
            }
            Write-Host "[OK] VirtualPaper.UI started via fallback (PID: $($uiProc.Id))"
        }

        # ── 阶段 3：单例守卫验证 - 再次启动 UI，期望仍只有 1 个进程 ────────
        Write-Host "Verifying singleton: launching VirtualPaper.UI again..."
        Start-Process -FilePath $uiExe -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 3

        $uiProcs = @(Get-Process -Name "VirtualPaper.UI" -ErrorAction SilentlyContinue)
        if ($uiProcs.Count -ne 1) {
            Write-Error "Singleton check FAILED: expected 1 VirtualPaper.UI process, found $($uiProcs.Count)"
            taskkill /F /T /PID $main.Id 2>$null
            Get-Process -Name "VirtualPaper.UI" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            exit 1
        }
        Write-Host "[OK] Singleton check passed: only 1 VirtualPaper.UI process (PID: $($uiProcs[0].Id))"

        # ── 清理 ───────────────────────────────────────────────────────────
        taskkill /F /T /PID $main.Id 2>$null
        Get-Process -Name "VirtualPaper.UI" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
        Write-Host "[OK] Smoke test passed"

    - name: Verify UI cannot start without main process
      shell: powershell
      run: |
        $installDir = "${{ steps.install.outputs.install_dir }}"
        $uiExe = "$installDir\Plugins\UI\VirtualPaper.UI.exe"

        # 前置清理：确保主进程与 UI 进程均未运行（强杀残留）
        @("VirtualPaper", "VirtualPaper.UI") | ForEach-Object {
            $procs = Get-Process -Name $_ -ErrorAction SilentlyContinue
            if ($procs) {
                Write-Host "[CLEANUP] Killing residual process: $_"
                $procs | Stop-Process -Force -ErrorAction SilentlyContinue
            }
        }
        Start-Sleep -Seconds 1

        # ── 直接启动 UI（不启动主进程）──────────────────────────────────────
        Write-Host "Launching VirtualPaper.UI.exe without main process..."
        $uiProc = Start-Process -FilePath $uiExe -PassThru -ErrorAction Stop

        # 等待足够时间让 MessageBox 弹出
        Start-Sleep -Seconds 3

        # ── 断言：进程应仍在运行（被 MessageBox 阻塞，未正常退出）────────────
        $uiProc.Refresh()
        if ($uiProc.HasExited) {
            Write-Error "VirtualPaper.UI exited on its own - expected it to be blocked by a MessageBox"
            exit 1
        }

        # ── 进一步断言：确认是 MessageBox（#32770）而非 UI 正常启动 ──────────
        # 通过 UIAutomation 枚举该进程的顶层窗口并读取 Win32 ClassName
        # MessageBox 的 ClassName 固定为 #32770，无需注入 C# 代码
        Add-Type -AssemblyName UIAutomationClient
        Add-Type -AssemblyName UIAutomationTypes

        $desktop = [System.Windows.Automation.AutomationElement]::RootElement
        $pidCond = New-Object System.Windows.Automation.PropertyCondition(
            [System.Windows.Automation.AutomationElement]::ProcessIdProperty,
            $uiProc.Id)
        $wins = $desktop.FindAll([System.Windows.Automation.TreeScope]::Children, $pidCond)
        $classes = @($wins | ForEach-Object { $_.Current.ClassName })
        Write-Host "  Visible window classes: $($classes -join ', ')"

        # ── 正向断言：MessageBox（#32770）应存在 ────────────────────────────
        # Win32 MessageBox 的窗口类名固定为 #32770，是 Windows API 常量，不会变。
        if (-not ($classes -contains '#32770')) {
            Write-Error "Expected a MessageBox (#32770) but none found - UI may have started normally, guard logic broken"
            Stop-Process -Id $uiProc.Id -Force -ErrorAction SilentlyContinue
            exit 1
        }
        Write-Host "[OK] MessageBox (#32770) present - guard triggered as expected (PID: $($uiProc.Id))"

        # ── 反向断言：WinUI3 主窗口（WinUIDesktopWin32Window）不应存在 ──────
        # WinUI3 正常启动后主窗口类名固定为 WinUIDesktopWin32Window。
        # 若守卫生效，此类名不应出现——与 #32770 正向检查互补，
        # 覆盖未来从 MessageBox 迁移到其他阻塞机制（ContentDialog 等）的场景：
        # 届时 #32770 检查会失效，但此反向检查仍能捕获"UI 意外正常启动"。
        if ($classes -contains 'WinUIDesktopWin32Window') {
            Write-Error "WinUI3 main window (WinUIDesktopWin32Window) appeared - UI started normally without main process, guard logic broken"
            Stop-Process -Id $uiProc.Id -Force -ErrorAction SilentlyContinue
            exit 1
        }
        Write-Host "[OK] WinUI3 main window not present - guard is holding correctly"

        # ── 清理：强杀被阻塞的 UI 进程 ──────────────────────────────────────
        Stop-Process -Id $uiProc.Id -Force -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 1
        $uiProc.Refresh()
        if (-not $uiProc.HasExited) {
            taskkill /F /PID $uiProc.Id 2>$null
        }
        Write-Host "[OK] Standalone-UI guard test passed"

  # ─────────────────────────────────────────────────────────────
  # Job 4.5: 制作插件更新包（plugin zips + manifest）
  # 仅在冒烟测试通过且 PR 有 plugin-packages 标签时执行
  # ─────────────────────────────────────────────────────────────
  package_plugin_update:
    name: Create Plugin Packages
    runs-on: windows-latest
    needs: [prepare, build, smoke_test]
    if: needs.prepare.outputs.has_plugin_update == 'true'

    steps:
    - name: Download build output
      uses: actions/download-artifact@v4
      with:
        name: build-release-output
        path: src/

    - name: Create Plugin packages
      shell: pwsh
      run: |
        $buildDir = "src/VirtualPaper/bin/Release/net8.0-windows10.0.19041.0"
        $pluginsDir = "$buildDir/Plugins"
        $outputDir = "plugin-packages"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

        $buildNumber = "${{ needs.prepare.outputs.build_number }}"
        $plugins = "${{ needs.prepare.outputs.update_plugins }}" -split ';' | Where-Object { $_ -ne "" }

        # Create each plugin zip containing only the plugin folder
        foreach ($plugin in $plugins) {
            $pluginDir = "$pluginsDir/$plugin"
            if (Test-Path $pluginDir) {
                $pluginLower = $plugin.ToLower()
                $zipName = "plugin-$pluginLower-$buildNumber.zip"
                $zipPath = "$outputDir/$zipName"
                # Zip the folder itself (not just contents)
                Compress-Archive -Path $pluginDir -DestinationPath $zipPath -Force
                Write-Host "[OK] Created $zipName"
            } else {
                Write-Warning "Plugin directory not found: $pluginDir"
            }
        }

        # Generate update_manifest.json with zip-level SHA256
        # 使用 System.Text.Json 的 Utf8JsonWriter 替代 ConvertTo-Json，
        # 避免 PowerShell 5.1 默认缩进随嵌套深度爆炸的问题
        $ms = [System.IO.MemoryStream]::new()
        $writer = [System.Text.Json.Utf8JsonWriter]::new($ms, [System.Text.Json.JsonWriterOptions]@{
            Indented = $true
        })

        $writer.WriteStartObject()
        $writer.WriteString("type", "plugins")
        $writer.WriteString("app_build", $buildNumber)
        $writer.WriteString("min_app_build", $buildNumber)
        $writer.WritePropertyName("plugins")
        $writer.WriteStartObject()

        foreach ($plugin in $plugins) {
            $pluginLower = $plugin.ToLower()
            $zipName = "plugin-$pluginLower-$buildNumber.zip"
            $zipPath = "$outputDir/$zipName"
            if (Test-Path $zipPath) {
                $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLower()
                $writer.WritePropertyName($plugin)
                $writer.WriteStartObject()
                $writer.WriteString("build", $buildNumber)
                $writer.WriteString("asset", $zipName)
                $writer.WriteString("sha256", $hash)
                $writer.WriteEndObject()
            }
        }

        $writer.WriteEndObject()
        $writer.WriteEndObject()
        $writer.Flush()

        $manifestJson = [System.Text.Encoding]::UTF8.GetString($ms.ToArray())
        $writer.Dispose()
        $ms.Dispose()

        # Use UTF-8 without BOM to match client-side hash computation
        $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
        [System.IO.File]::WriteAllText("$outputDir/plugin-manifest.json", $manifestJson, $utf8NoBom)
        Write-Host "[OK] Generated plugin-manifest.json"
        Write-Host $manifestJson

        # Generate PLUGIN_MANIFEST_SHA256.txt for manifest verification
        $manifestHash = (Get-FileHash -Path "$outputDir/plugin-manifest.json" -Algorithm SHA256).Hash.ToLower()
        [System.IO.File]::WriteAllText("$outputDir/PLUGIN_MANIFEST_SHA256.txt", $manifestHash, $utf8NoBom)
        Write-Host "[OK] Generated PLUGIN_MANIFEST_SHA256.txt: $manifestHash"

    - name: Upload plugin update packages
      uses: actions/upload-artifact@v4
      with:
        name: VirtualPaper-Plugins-v${{ needs.prepare.outputs.new_version }}
        path: plugin-packages/
        retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Job 5: 将版本号递增变更提交到 main（冒烟测试通过后才提交）
  # ─────────────────────────────────────────────────────────────
  bump:
    name: Bump Version to main
    runs-on: windows-latest
    needs: [prepare, package, smoke_test, package_plugin_update]
    if: |
      always() &&
      needs.prepare.outputs.has_plugin_update != 'true' &&
      needs.smoke_test.result == 'success'

    steps:
    - name: Checkout main with full history
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.RELEASE_PAT }}
        fetch-depth: 0

    - name: Update version in csproj
      shell: powershell
      run: |
        $csprojPath = "src/VirtualPaper/VirtualPaper.csproj"
        $content = Get-Content $csprojPath -Raw
        $newVersion = "${{ needs.prepare.outputs.new_version }}"
        $newContent = $content -replace '<AssemblyVersion>\d+\.\d+\.\d+\.\d+</AssemblyVersion>', "<AssemblyVersion>$newVersion</AssemblyVersion>"
        Set-Content $csprojPath -Value $newContent -NoNewline
        Write-Host "Updated csproj version to: $newVersion"

    - name: Update version in InnoSetup script
      shell: powershell
      run: |
        $setupPath = "InnoSetup/setup.iss"
        $content = Get-Content $setupPath -Raw
        $newVersion = "${{ needs.prepare.outputs.new_version }}"
        $newVersionText = "${{ needs.prepare.outputs.new_version_text }}"
        $newContent = $content -replace '#define MyAppVersion "[\d\.]+"', "#define MyAppVersion `"$newVersion`""
        $newContent = $newContent -replace '#define MyAppVersionText "[\d_]+"', "#define MyAppVersionText `"$newVersionText`""
        Set-Content $setupPath -Value $newContent -NoNewline
        Write-Host "Updated InnoSetup version to: $newVersion"

    - name: Update version badge in README
      shell: powershell
      run: |
        $readmePath = "README.md"
        $content = Get-Content $readmePath -Raw
        $newVersion = "${{ needs.prepare.outputs.new_version }}"
        $newContent = $content -replace '(img\.shields\.io/badge/release-v)[\d\.]+(-blue)', "`${1}$newVersion`$2"
        Set-Content $readmePath -Value $newContent -NoNewline
        Write-Host "Updated README badge version to: $newVersion"

    - name: Commit and push to main
      shell: powershell
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add src/VirtualPaper/VirtualPaper.csproj InnoSetup/setup.iss README.md
        git commit -m "[Github CI] chore: bump version to ${{ needs.prepare.outputs.new_version }} [skip ci]"
        git push origin main
        Write-Host "[OK]" -ForegroundColor Green -NoNewline; Write-Host " Version ${{ needs.prepare.outputs.new_version }} committed to main"

  # ─────────────────────────────────────────────────────────────
  # Job 6: 将 main 同步到 pre-publish branches
  #   策略1: git merge main -X theirs（全量合并，冲突以 main 为准）
  #   策略2: reset --hard origin/main（fallback，冲突无法自动解决时强制覆盖）
  # ─────────────────────────────────────────────────────────────
  sync:
    name: Sync Version to Pre-publish Branches
    runs-on: windows-latest
    needs: [prepare, bump]
    if: |
      always() &&
      needs.bump.result == 'success'

    steps:
    - name: Checkout with full history
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.RELEASE_PAT }}
        fetch-depth: 0

    - name: Sync main -> pre-publish branches (merge with main override on conflict)
      shell: powershell
      run: |
        $newVersion = "${{ needs.prepare.outputs.new_version }}"

        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # 确保拿到 bump job 刚推送的最新 main
        $ErrorActionPreference = 'Continue'
        git fetch origin 2>&1 | Out-Null
        $ErrorActionPreference = 'Stop'

        foreach ($branch in @("release", "dev", "bugfix")) {
            Write-Host ""
            Write-Host "--- Syncing main -> $branch ---"

            git checkout -B $branch origin/$branch

            # 策略 1：尝试将 main 全量合并到当前分支
            #   -X theirs: 冲突时自动以 main 为准，无需人工介入
            $mergeOutput = git merge origin/main -m "[Github CI] chore: sync main -> $branch [skip ci]" -X theirs 2>&1
            $mergeExit = $LASTEXITCODE

            if ($mergeExit -eq 0) {
                # 合并成功（含自动解决的冲突）或 Already up to date
                if ($mergeOutput -match 'Already up to date') {
                    Write-Host "[SKIP] $branch already up to date with main"
                    continue
                }
                Write-Host "  [OK] main merged into $branch (conflicts auto-resolved with -X theirs)"
                git push origin $branch
                Write-Host "[OK]" -ForegroundColor Green -NoNewline; Write-Host " $branch fully synced with main"
            }
            else {
                # 策略 2（fallback）：merge 无法自动解决 → 放弃，直接 reset --hard 到 main
                # 使用 reset --hard 直接移动分支指针，不产生额外 commit，
                # 历史看起来如同这次 merge 从未发生，比 git revert 更干净彻底。
                Write-Host "  [WARN]" -ForegroundColor Yellow -NoNewline; Write-Host " merge has unresolvable conflicts, force-resetting to origin/main"
                git merge --abort

                git reset --hard origin/main
                git push --force-with-lease origin $branch
                Write-Host "[WARN]" -ForegroundColor Yellow -NoNewline; Write-Host " $branch force-reset to origin/main (unresolvable conflicts overridden)"
            }
        }

  # ─────────────────────────────────────────────────────────────
  # Job 7: 汇总输出（始终执行）
  # ─────────────────────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [prepare, build, package, smoke_test, package_plugin_update, bump, sync]
    if: |
      !cancelled() &&
      needs.prepare.result == 'success' &&
      needs.build.result == 'success' &&
      needs.package.result == 'success' &&
      needs.smoke_test.result == 'success' &&
      (needs.prepare.outputs.has_plugin_update == 'true' || (needs.bump.result == 'success' && needs.sync.result == 'success')) &&
      (needs.prepare.outputs.has_plugin_update != 'true' || needs.package_plugin_update.result == 'success')

    steps:
    - name: Print summary
      run: |
        INCREMENT="${{ needs.prepare.outputs.increment_type }}"
        if [ "$INCREMENT" = "feature" ]; then TYPE="Major Feature Update"
        elif [ "$INCREMENT" = "minor" ]; then TYPE="Daily Update"
        else TYPE="Bugfix Update"; fi

        echo ""
        echo -e "\033[0;32m================= Build Complete =================\033[0m"
        echo    "Project : VirtualPaper"
        echo -e "\033[0;36mVersion : ${{ needs.prepare.outputs.current_version }} -> ${{ needs.prepare.outputs.new_version }}\033[0m"
        echo    "Source  : ${{ needs.prepare.outputs.source_branch }} -> main"
        echo    "Type    : $TYPE"
        echo -e "\033[0;36mPackage : ${{ needs.package.outputs.installer_name }}\033[0m"
        
        if [ "${{ needs.prepare.outputs.has_plugin_update }}" = "true" ]; then
          echo -e "\033[0;36mPlugins Update: YES (plugins: ${{ needs.prepare.outputs.update_plugins }}, build: ${{ needs.prepare.outputs.build_number }})\033[0m"
        else
          echo    "Plugins Update: NO (installer only)"
        fi
        
        echo ""
        if [ "${{ needs.prepare.outputs.has_plugin_update }}" = "true" ]; then
          echo -e "\033[0;33m[SKIP]\033[0m Version bump skipped (plugin update - version unchanged)"
          echo -e "\033[0;33m[SKIP]\033[0m Branch sync skipped (plugin update)"
        else
          echo -e "\033[0;32m[OK]\033[0m Version updated and committed to main"
          echo -e "\033[0;32m[OK]\033[0m Version synced to pre-publish branches (release / dev / bugfix)"
        fi
        echo -e "\033[0;32m[OK]\033[0m Installer uploaded as Artifact"
        if [ "${{ needs.prepare.outputs.has_plugin_update }}" = "true" ]; then
          echo -e "\033[0;32m[OK]\033[0m Plugins update packages uploaded as Artifact"
        fi
        echo -e "\033[0;32m[OK]\033[0m Smoke test passed (install + launch + singleton)"
        echo -e "\033[0;32m[OK]\033[0m Draft GitHub Release will be created: v${{ needs.prepare.outputs.new_version }}"
        echo -e "\033[0;32m==========================================\033[0m"

  # ─────────────────────────────────────────────────────────────
  # Job 8: 创建草稿 GitHub Release（所有步骤均成功后执行）
  #   - 等待 summary 通过，即代表全流程无任何错误
  #   - 以 PR body 作为 Release 正文
  #   - Tag / Release 标题均为 "v版本号"
  #   - 将 Installer exe 作为 Release 附件上传
  #   - 如有重启式更新包，一并上传
  #   - 创建为草稿（draft），需人工验证后手动点击发布
  # ─────────────────────────────────────────────────────────────
  release:
    name: Create Draft GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build, package, smoke_test, package_plugin_update, bump, sync, summary]
    if: |
      !cancelled() &&
      needs.prepare.result == 'success' &&
      needs.build.result == 'success' &&
      needs.package.result == 'success' &&
      needs.smoke_test.result == 'success' &&
      (needs.prepare.outputs.has_plugin_update == 'true' || (needs.bump.result == 'success' && needs.sync.result == 'success')) &&
      (needs.prepare.outputs.has_plugin_update != 'true' || needs.package_plugin_update.result == 'success')

    steps:
    - name: Download installer artifact
      uses: actions/download-artifact@v4
      with:
        name: VirtualPaper-Installer-v${{ needs.prepare.outputs.new_version }}
        path: dist/

    - name: Download plugin update artifact
      if: needs.prepare.outputs.has_plugin_update == 'true'
      uses: actions/download-artifact@v4
      with:
        name: VirtualPaper-Plugins-v${{ needs.prepare.outputs.new_version }}
        path: dist/plugin-packages/

    - name: Create Draft Release & Tag
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.prepare.outputs.release_tag }}
        name: ${{ needs.prepare.outputs.has_plugin_update == 'true' && format('v{0} Plugin Update (Build {1})', needs.prepare.outputs.new_version, needs.prepare.outputs.build_number) || format('v{0} (Build {1})', needs.prepare.outputs.new_version, needs.prepare.outputs.build_number) }}
        body: ${{ needs.prepare.outputs.pr_body }}
        files: |
          dist/*.exe
          dist/SHA256.txt
          dist/plugin-packages/*.zip
          dist/plugin-packages/plugin-manifest.json
          dist/plugin-packages/PLUGIN_MANIFEST_SHA256.txt
        draft: true        # 草稿状态，不对外公开，等待人工验证后发布
        make_latest: false  # 草稿阶段不标记为最新，发布时再生效
        token: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Job 9: 失败回滚（bump 或 sync 执行后失败时）
  # ─────────────────────────────────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: windows-latest
    needs: [prepare, build, package, smoke_test, package_plugin_update, bump, sync]
    # 触发条件：
    #   1. 仅针对常规安装式更新（重启式更新不涉及版本同步，无需回滚）
    #   2. bump 或 sync 已经开始执行（分支内容已被修改），且流程出现失败或取消
    #   3. bump 依赖 smoke_test 成功，因此 smoke_test 失败时 bump/sync 均为 skipped，不触发回滚
    if: |
      always() &&
      needs.prepare.outputs.has_plugin_update != 'true' &&
      needs.prepare.result == 'success' &&
      (needs.bump.result != 'skipped' || needs.sync.result != 'skipped') &&
      (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled'))

    steps:
    - name: Checkout with full history
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.RELEASE_PAT }}
        fetch-depth: 0

    - name: Rollback changes
      shell: powershell
      run: |
        Write-Host ""
        Write-Host "[WARN]" -ForegroundColor Yellow -NoNewline; Write-Host " Pipeline failure detected, starting rollback..."

        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        $ErrorActionPreference = 'Continue'
        git fetch origin 2>&1 | Out-Null
        $ErrorActionPreference = 'Stop'

        # 使用 reset --hard 而非 revert，因为 sync 可能产生 merge commit，
        # revert merge commit 需要 -m 指定主线，直接 reset 更可靠
        $shaMap = @{
            "main"    = "${{ needs.prepare.outputs.main_sha }}"
            "release" = "${{ needs.prepare.outputs.release_sha }}"
            "dev"     = "${{ needs.prepare.outputs.dev_sha }}"
            "bugfix"  = "${{ needs.prepare.outputs.bugfix_sha }}"
        }

        foreach ($branch in $shaMap.Keys) {
            $targetSha = $shaMap[$branch]
            if (-not $targetSha) { continue }

            $ErrorActionPreference = 'Continue'
            $currentSha = git rev-parse origin/$branch 2>&1
            $ErrorActionPreference = 'Stop'

            if ($LASTEXITCODE -eq 0 -and $currentSha -ne $targetSha) {
                Write-Host "[ROLLBACK]" -ForegroundColor Cyan -NoNewline; Write-Host " ${branch}: resetting to $($targetSha.Substring(0,7))"
                git checkout -B $branch $targetSha
                git push --force-with-lease origin $branch
                Write-Host "[OK]" -ForegroundColor Green -NoNewline; Write-Host " $branch reset to pre-CI state"
            } else {
                Write-Host "[SKIP] ${branch}: no changes detected, rollback not needed"
            }
        }

        Write-Host ""
        Write-Host "================ Build Failed ================" -ForegroundColor Red
        Write-Host "[ERROR]" -ForegroundColor Red -NoNewline; Write-Host " Please check the following:"
        Write-Host "  - .NET 8.0 build result"
        Write-Host "  - InnoSetup script correctness"
        Write-Host "  - Version format validity"
        Write-Host "  - GitHub Token permissions"
        Write-Host "==========================================" -ForegroundColor Red
