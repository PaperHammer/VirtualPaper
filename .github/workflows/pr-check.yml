name: PR Check for Dev to Main

# 当创建从 dev 到 main 的 PR 时触发
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  check-dev-tests:
    name: Check Dev Tests Status
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check if source branch is dev
      if: github.head_ref != 'dev'
      run: |
        echo "❌ This workflow only applies to PRs from dev branch to main"
        echo "Current source branch: ${{ github.head_ref }}"
        exit 1

    - name: Get latest commit status from dev branch
      id: dev-status
      uses: actions/github-script@v7
      with:
        script: |
          const { context, github } = require('@actions/github');
          
          // 获取dev分支最新commit的状态
          const devCommit = context.payload.pull_request.head.sha;
          console.log(`Checking status for dev commit: ${devCommit}`);
          
          try {
            // 获取commit状态
            const statusResponse = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: devCommit
            });
            
            console.log('Combined status:', statusResponse.data.state);
            console.log('Individual statuses:', statusResponse.data.statuses);
            
            // 查找我们关心的测试状态
            const testStatus = statusResponse.data.statuses.find(status => 
              status.context === 'ci/dev-tests'
            );
            
            if (!testStatus) {
              console.log('No dev tests status found, checking workflow runs...');
              
              // 如果没有找到状态，检查最近的workflow runs
              const runsResponse = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'dev-ci.yml',
                branch: 'dev',
                head_sha: devCommit,
                per_page: 1
              });
              
              if (runsResponse.data.workflow_runs.length > 0) {
                const latestRun = runsResponse.data.workflow_runs[0];
                console.log('Latest workflow run:', latestRun.conclusion);
                
                if (latestRun.conclusion === 'success') {
                  return { state: 'success', message: 'Tests passed in latest workflow run' };
                } else if (latestRun.conclusion === 'failure') {
                  return { state: 'failure', message: 'Tests failed in latest workflow run' };
                } else {
                  return { state: 'pending', message: 'Tests are still running or workflow is incomplete' };
                }
              } else {
                return { state: 'missing', message: 'No test results found for this commit' };
              }
            } else {
              return { 
                state: testStatus.state, 
                message: testStatus.description || 'Test status found'
              };
            }
          } catch (error) {
            console.error('Error checking status:', error);
            return { state: 'error', message: 'Failed to check test status' };
          }

    - name: Validate test results
      run: |
        echo "Test status: ${{ fromJson(steps.dev-status.outputs.result).state }}"
        echo "Message: ${{ fromJson(steps.dev-status.outputs.result).message }}"
        
        case "${{ fromJson(steps.dev-status.outputs.result).state }}" in
          "success")
            echo "✅ Dev branch tests have passed. PR can be merged."
            ;;
          "failure")
            echo "❌ Dev branch tests have failed. Please fix the issues before merging."
            exit 1
            ;;
          "pending")
            echo "⏳ Dev branch tests are still running. Please wait for completion."
            exit 1
            ;;
          "missing")
            echo "❓ No test results found for the dev branch commit. Please ensure tests have run."
            exit 1
            ;;
          "error")
            echo "💥 Error occurred while checking test status."
            exit 1
            ;;
          *)
            echo "❓ Unknown test status."
            exit 1
            ;;
        esac

    - name: Add PR comment
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const { context, github } = require('@actions/github');
          const testResult = ${{ steps.dev-status.outputs.result }};
          
          let emoji, status, message, color;
          
          switch (testResult.state) {
            case 'success':
              emoji = '✅';
              status = 'PASSED';
              message = 'All tests on dev branch have passed. This PR is ready to merge.';
              color = 'green';
              break;
            case 'failure':
              emoji = '❌';
              status = 'FAILED';
              message = 'Tests on dev branch have failed. Please fix the issues before merging.';
              color = 'red';
              break;
            case 'pending':
              emoji = '⏳';
              status = 'RUNNING';
              message = 'Tests on dev branch are still running. Please wait for completion.';
              color = 'yellow';
              break;
            case 'missing':
              emoji = '❓';
              status = 'MISSING';
              message = 'No test results found for the dev branch. Please ensure tests have run.';
              color = 'orange';
              break;
            default:
              emoji = '💥';
              status = 'ERROR';
              message = 'Error occurred while checking test status.';
              color = 'red';
          }
          
          const comment = `## ${emoji} Dev Branch Test Status: ${status}
          
${message}

**Details:**
- **Source Branch**: \`dev\`
- **Target Branch**: \`main\`
- **Test Status**: ${testResult.state}
- **Message**: ${testResult.message}

---
*This check ensures that all tests pass on the dev branch before allowing merge to main.*`;

          // 查找是否已有评论
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number
          });
          
          const existingComment = comments.data.find(comment => 
            comment.body.includes('Dev Branch Test Status')
          );
          
          if (existingComment) {
            // 更新现有评论
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body: comment
            });
          } else {
            // 创建新评论
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment
            });
          }