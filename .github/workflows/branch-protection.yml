name: Main Branch Protection

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  statuses: write
  pull-requests: write
  issues: write

jobs:
  check-source-branch:
    name: Check Source Branch
    runs-on: ubuntu-latest
    
    steps:
    - name: Validate source branch
      run: |
        SOURCE_BRANCH="${{ github.head_ref }}"
        echo "Source branch: $SOURCE_BRANCH"
        echo "Target branch: ${{ github.base_ref }}"
        
        if [ "$SOURCE_BRANCH" != "dev" ]; then
          echo "❌ Error: Only dev branch is allowed to merge into main branch."
          echo "Current source branch: $SOURCE_BRANCH"
          echo ""
          echo "Please follow the correct workflow:"
          echo "1. Merge your feature branch into dev first"
          echo "2. Ensure tests pass on dev branch"
          echo "3. Then create PR from dev to main"
          exit 1
        else
          echo "✅ Source branch validation passed: dev → main"
        fi

    - name: Add PR comment
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const sourceBranch = context.payload.pull_request.head.ref;
          
          let body;
          
          if (sourceBranch === 'dev') {
            body = '## ✅ Branch Validation Passed\n\n' +
              '**Source Branch**: `' + sourceBranch + '` → **Target Branch**: `main`\n\n' +
              '✅ This PR follows the correct workflow: `dev` → `main`\n\n' +
              '**Next Steps:**\n' +
              '- Ensure all tests pass on the dev branch\n' +
              '- Request code review\n' +
              '- Merge when ready\n\n' +
              '---\n' +
              '*This check ensures only dev branch can merge into main.*';
          } else {
            body = '## ❌ Invalid Source Branch\n\n' +
              '**Source Branch**: `' + sourceBranch + '` → **Target Branch**: `main`\n\n' +
              '❌ **Error**: Only `dev` branch is allowed to merge into `main` branch.\n\n' +
              '**Correct Workflow:**\n' +
              '1. 🔀 Merge your feature branch into `dev` first\n' +
              '2. ✅ Ensure tests pass on `dev` branch\n' +
              '3. 📝 Create PR from `dev` to `main`\n\n' +
              '**Please close this PR and follow the correct workflow.**\n\n' +
              '---\n' +
              '*This check ensures code quality and proper release flow.*';
          }
          
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number
          });
          
          const existingComment = comments.data.find(c => 
            c.body.includes('Branch Validation') || c.body.includes('Invalid Source Branch')
          );
          
          if (existingComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body: body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });
          }

    - name: Create status check
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const sourceBranch = context.payload.pull_request.head.ref;
          
          const state = sourceBranch === 'dev' ? 'success' : 'failure';
          const description = sourceBranch === 'dev' 
            ? 'Source branch validation passed ✅'
            : 'Only dev branch allowed to merge to main ❌';
          
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.payload.pull_request.head.sha,
            state: state,
            target_url: context.payload.repository.html_url + '/actions/runs/' + context.runId,
            description: description,
            context: 'branch-protection/source-validation'
          });