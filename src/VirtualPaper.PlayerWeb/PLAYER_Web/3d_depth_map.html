<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayerWeb3DDepthMap</title>
    <script src="js/base.js"></script>
    <script type="module" src="js/3d_depth/run.js"></script>
</head>

<body>
    <div class="root" draggable="false">
        <div id="content" class="background" draggable="false"></div>
    </div>        
</body>

</html>

<style>
    html,
    body {
        overflow: hidden;
        height: 100%;
        margin: 0;
        padding: 0;
    }

    .root {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
        perspective: 1000px;
    }

    /* 和 default 对齐的 content/source 基础样式 */
    #content {
        width: 100%;
        height: 100%;
        position: absolute;
        transform-origin: center;
    }

    .source {
        width: 100%;
        height: 100%;
        position: absolute;
        object-fit: fill;
    }

    /* 淡入效果 */
    .fade-in {
        opacity: 0;
        animation: fadeIn 0.5s ease-in forwards;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
        }
    }

    /* 淡出效果 */
    .fade-out {
        opacity: 1;
        animation: fadeOut 0.5s ease-out forwards;
    }

    @keyframes fadeOut {
        to {
            opacity: 0;
        }
    }
</style>
