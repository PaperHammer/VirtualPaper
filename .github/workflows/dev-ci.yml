name: Dev Branch CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

permissions:
  contents: read
  statuses: write
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build Solution
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj', 'src/**/*.props') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Restore dependencies
      run: dotnet restore src/VirtualPaper.sln

    - name: Build solution
      run: dotnet build src/VirtualPaper.sln --configuration Release --no-restore

    - name: Upload build output
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        retention-days: 7
        path: |
          src/**/*.csproj
          src/**/*.props
          src/**/*.targets
          src/**/bin/Release/
          src/**/*.sln
          !src/**/obj/
          !src/**/*.pdb
        include-hidden-files: false

  test-core:
    name: Core Tests
    runs-on: windows-latest
    needs: build
    
    steps:
    - name: Download build output
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: src/

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj', 'src/**/*.props') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Run Core Tests
      run: dotnet test src/VirtualPaper.Core.Test/VirtualPaper.Core.Test.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=core-tests.trx" --results-directory TestResults/Core
      shell: pwsh

    - name: Upload Core test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-core
        path: TestResults/Core/
        retention-days: 7

  test-ui:
    name: UI Tests
    runs-on: windows-latest
    needs: build
    
    steps:
    - name: Download build output
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: src/

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj', 'src/**/*.props') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Run UI Tests
      run: dotnet test src/VirtualPaper.UI.Test/VirtualPaper.UI.Test.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=ui-tests.trx" --results-directory TestResults/UI
      shell: pwsh

    - name: Upload UI test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-ui
        path: TestResults/UI/
        retention-days: 7

  test-ml:
    name: ML Tests
    runs-on: windows-latest
    needs: build
    
    steps:
    - name: Download build output
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: src/

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj', 'src/**/*.props') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Run ML Tests
      run: dotnet test src/VirtualPaper.ML.Test/VirtualPaper.ML.Test.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=ml-tests.trx" --results-directory TestResults/ML
      shell: pwsh

    - name: Upload ML test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-ml
        path: TestResults/ML/
        retention-days: 7

  test-shader:
    name: Shader Tests
    runs-on: windows-latest
    needs: build
    
    steps:
    - name: Download build output
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: src/

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj', 'src/**/*.props') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Run Shader Tests
      run: dotnet test src/VirtualPaper.Shader.Test/VirtualPaper.Shader.Test.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=shader-tests.trx" --results-directory TestResults/Shader
      shell: pwsh

    - name: Upload Shader test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-shader
        path: TestResults/Shader/
        retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [build, test-core, test-ui, test-ml, test-shader]
    if: always()
    
    steps:
    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        pattern: test-results-*
        merge-multiple: true
        path: TestResults/

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: All .NET Tests
        path: "TestResults/**/*.trx"
        reporter: dotnet-trx
        fail-on-error: false

    - name: Upload combined test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-combined-${{ github.sha }}
        path: TestResults/
        retention-days: 30

    - name: Set test status
      if: always()
      run: |
        if [ "${{ needs.build.result }}" = "success" ] && [ "${{ needs.test-core.result }}" = "success" ] && [ "${{ needs.test-ui.result }}" = "success" ] && [ "${{ needs.test-ml.result }}" = "success" ] && [ "${{ needs.test-shader.result }}" = "success" ]; then
          echo "TEST_STATUS=success" >> $GITHUB_ENV
          echo "TEST_DESCRIPTION=All tests passed ✅" >> $GITHUB_ENV
        else
          echo "TEST_STATUS=failure" >> $GITHUB_ENV
          echo "TEST_DESCRIPTION=Some tests failed ❌" >> $GITHUB_ENV
        fi

    - name: Create Status Check
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const state = process.env.TEST_STATUS || 'failure';
          const description = process.env.TEST_DESCRIPTION || 'Tests failed';
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.sha,
            state: state,
            target_url: `${context.payload.repository.html_url}/actions/runs/${context.runId}`,
            description: description,
            context: 'ci/dev-tests'
          });