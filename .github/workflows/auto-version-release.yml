name: Auto Version & Build on Main Merge

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: false  # 同一时间只允许一个构建，确保版本号不发生竞争

permissions:
  contents: write
  statuses: write

jobs:
  auto-version-and-build:
    runs-on: windows-latest
    # 跳过由 GitHub Action 自身提交的版本号更新（[skip ci]）
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
    - name: Checkout with full history
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Record original branch SHAs
      id: original_shas
      shell: powershell
      run: |
        # 记录 main 当前 HEAD
        $mainSha = git rev-parse HEAD
        Write-Output "main_sha=$mainSha" >> $env:GITHUB_OUTPUT
        Write-Host "main SHA: $mainSha"

        # 尝试记录 dev 分支 HEAD
        git fetch origin dev 2>$null
        if ($LASTEXITCODE -eq 0) {
            $devSha = git rev-parse origin/dev
            Write-Output "dev_sha=$devSha" >> $env:GITHUB_OUTPUT
            Write-Host "dev SHA: $devSha"
        } else {
            Write-Output "dev_sha=" >> $env:GITHUB_OUTPUT
            Write-Host "dev branch not found"
        }

        # 尝试记录 bugfix 分支 HEAD
        git fetch origin bugfix 2>$null
        if ($LASTEXITCODE -eq 0) {
            $bugfixSha = git rev-parse origin/bugfix
            Write-Output "bugfix_sha=$bugfixSha" >> $env:GITHUB_OUTPUT
            Write-Host "bugfix SHA: $bugfixSha"
        } else {
            Write-Output "bugfix_sha=" >> $env:GITHUB_OUTPUT
            Write-Host "bugfix branch not found"
        }

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Inno Setup
      run: |
        Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile "innosetup.exe"
        Start-Process -FilePath "innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
      shell: powershell

    - name: Determine source branch and version increment
      id: branch_info
      shell: powershell
      run: |
        # 获取最近的commit信息来判断来源分支
        $commitMessage = git log -1 --pretty=format:"%s"
        $mergeInfo = git log -1 --pretty=format:"%B"

        Write-Host "Commit message: $commitMessage"
        Write-Host "Merge info: $mergeInfo"

        # 判断是从哪个分支合并过来的
        $sourceBranch = "unknown"
        $incrementType = "patch"  # 默认第4位+1

        if ($mergeInfo -match "Merge.*dev.*into.*main" -or $commitMessage -match "dev") {
            $sourceBranch = "dev"
            $incrementType = "minor"  # 第3位+1
            Write-Host "Detected merge from dev branch - incrementing minor version"
        }
        elseif ($mergeInfo -match "Merge.*bugfix.*into.*main" -or $commitMessage -match "bugfix") {
            $sourceBranch = "bugfix"
            $incrementType = "patch"  # 第4位+1
            Write-Host "Detected merge from bugfix branch - incrementing patch version"
        }
        else {
            # 尝试从最近的两个commits中找到merge信息
            $lastTwoCommits = git log -2 --oneline
            Write-Host "Last two commits: $lastTwoCommits"

            if ($lastTwoCommits -match "dev") {
                $sourceBranch = "dev"
                $incrementType = "minor"
            }
            elseif ($lastTwoCommits -match "bugfix") {
                $sourceBranch = "bugfix"
                $incrementType = "patch"
            }
        }

        Write-Output "source_branch=$sourceBranch" >> $env:GITHUB_OUTPUT
        Write-Output "increment_type=$incrementType" >> $env:GITHUB_OUTPUT

        Write-Host "Source branch: $sourceBranch"
        Write-Host "Increment type: $incrementType"

    - name: Get and update version
      id: version
      shell: powershell
      run: |
        # 读取 csproj 文件中的版本号
        $csprojPath = "src/VirtualPaper/VirtualPaper.csproj"
        $content = Get-Content $csprojPath -Raw
        $versionMatch = [regex]::Match($content, '<AssemblyVersion>(\d+)\.(\d+)\.(\d+)\.(\d+)</AssemblyVersion>')

        if (-not $versionMatch.Success) {
            Write-Error "Could not parse version from csproj file"
            exit 1
        }

        $major = [int]$versionMatch.Groups[1].Value
        $minor = [int]$versionMatch.Groups[2].Value
        $build = [int]$versionMatch.Groups[3].Value
        $revision = [int]$versionMatch.Groups[4].Value

        $currentVersion = "$major.$minor.$build.$revision"
        Write-Host "Current version: $currentVersion"

        # 根据分支类型更新版本号
        $incrementType = "${{ steps.branch_info.outputs.increment_type }}"
        if ($incrementType -eq "minor") {
            $build = $build + 1
            $revision = 0  # 重置第4位
            Write-Host "Incrementing build version (3rd position)"
        } else {
            $revision = $revision + 1
            Write-Host "Incrementing revision version (4th position)"
        }

        $newVersion = "$major.$minor.$build.$revision"
        $newVersionText = "$major$minor$build$revision"

        Write-Host "New version: $newVersion"
        Write-Host "New version text: $newVersionText"

        # 输出到 GITHUB_OUTPUT
        Write-Output "current_version=$currentVersion" >> $env:GITHUB_OUTPUT
        Write-Output "new_version=$newVersion" >> $env:GITHUB_OUTPUT
        Write-Output "new_version_text=$newVersionText" >> $env:GITHUB_OUTPUT
        Write-Output "major=$major" >> $env:GITHUB_OUTPUT
        Write-Output "minor=$minor" >> $env:GITHUB_OUTPUT
        Write-Output "build=$build" >> $env:GITHUB_OUTPUT
        Write-Output "revision=$revision" >> $env:GITHUB_OUTPUT

    - name: Update version in csproj
      shell: powershell
      run: |
        $csprojPath = "src/VirtualPaper/VirtualPaper.csproj"
        $content = Get-Content $csprojPath -Raw
        $newVersion = "${{ steps.version.outputs.new_version }}"

        $newContent = $content -replace '<AssemblyVersion>\d+\.\d+\.\d+\.\d+</AssemblyVersion>', "<AssemblyVersion>$newVersion</AssemblyVersion>"
        Set-Content $csprojPath -Value $newContent -NoNewline

        Write-Host "Updated csproj version to: $newVersion"

    - name: Update version in InnoSetup script
      shell: powershell
      run: |
        $setupPath = "InnoSetup/setup.iss"
        $content = Get-Content $setupPath -Raw
        $newVersion = "${{ steps.version.outputs.new_version }}"
        $newVersionText = "${{ steps.version.outputs.new_version_text }}"

        # 更新版本号
        $newContent = $content -replace '#define MyAppVersion "[\d\.]+"', "#define MyAppVersion `"$newVersion`""
        $newContent = $newContent -replace '#define MyAppVersionText "[\d]+"', "#define MyAppVersionText `"$newVersionText`""

        Set-Content $setupPath -Value $newContent -NoNewline

        Write-Host "Updated InnoSetup version to: $newVersion"
        Write-Host "Updated InnoSetup version text to: $newVersionText"

    - name: Update version badge in README
      shell: powershell
      run: |
        $readmePath = "README.md"
        $content = Get-Content $readmePath -Raw
        $newVersion = "${{ steps.version.outputs.new_version }}"

        # 匹配并替换 shields.io badge 中的版本号，例如：
        # [![GitHub release](https://img.shields.io/badge/release-v0.4.0.1-blue)]
        $newContent = $content -replace '(img\.shields\.io/badge/release-v)[\d\.]+(-blue)', "`${1}$newVersion`$2"

        Set-Content $readmePath -Value $newContent -NoNewline

        Write-Host "Updated README badge version to: $newVersion"

    - name: Build Release
      run: |
        dotnet restore
        dotnet build --configuration Release --no-restore

    - name: Create installer with InnoSetup
      id: build_installer
      shell: powershell
      run: |
        $isccPath = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
        if (-not (Test-Path $isccPath)) {
            $isccPath = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
        }

        if (-not (Test-Path $isccPath)) {
            Write-Error "Inno Setup compiler not found!"
            exit 1
        }

        Write-Host "Using ISCC at: $isccPath"

        # 编译安装程序
        & "$isccPath" "InnoSetup\setup.iss"

        if ($LASTEXITCODE -ne 0) {
            Write-Error "InnoSetup compilation failed!"
            exit 1
        }

        # 查找生成的安装程序
        $outputDir = "InnoSetup\Output"
        $installerFiles = Get-ChildItem -Path $outputDir -Filter "*.exe" -ErrorAction SilentlyContinue

        if ($installerFiles.Count -eq 0) {
            Write-Error "No installer found in output directory!"
            exit 1
        }

        $installerPath = $installerFiles[0].FullName
        Write-Host "Installer created: $installerPath"

        # 输出安装程序信息
        Write-Output "installer_path=$installerPath" >> $env:GITHUB_OUTPUT
        Write-Output "installer_name=$($installerFiles[0].Name)" >> $env:GITHUB_OUTPUT

    - name: Configure Git and commit version changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add src/VirtualPaper/VirtualPaper.csproj InnoSetup/setup.iss README.md
        git commit -m "[Github CI] chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
        git push origin main

    - name: Upload installer as artifact
      uses: actions/upload-artifact@v4
      with:
        name: VirtualPaper-installer-v${{ steps.version.outputs.new_version }}
        path: ${{ steps.build_installer.outputs.installer_path }}
        retention-days: 30

    - name: Sync version back to source branch
      shell: powershell
      run: |
        $sourceBranch = "${{ steps.branch_info.outputs.source_branch }}"

        if ($sourceBranch -eq "dev" -or $sourceBranch -eq "bugfix") {
            Write-Host "Syncing version back to $sourceBranch branch..."

            # 切换到源分支（明确基于远端 ref 建立本地分支，避免 checkout 找不到路径）
            git checkout -B $sourceBranch origin/$sourceBranch

            # 合并版本更新（--ff-only 确保只做快进合并，避免产生多余 merge commit）
            git merge main --ff-only
            git push origin $sourceBranch

            Write-Host "Version synced to $sourceBranch branch"
        } else {
            Write-Host "Unknown source branch: $sourceBranch, skipping sync"
        }

    - name: Summary
      shell: powershell
      run: |
        Write-Host ""
        Write-Host "🎉 ================= 构建完成 =================" -ForegroundColor Green
        Write-Host "📦 项目: VirtualPaper" -ForegroundColor Cyan
        Write-Host "🔢 版本: ${{ steps.version.outputs.current_version }} → ${{ steps.version.outputs.new_version }}" -ForegroundColor Yellow
        Write-Host "🌿 来源: ${{ steps.branch_info.outputs.source_branch }} → main" -ForegroundColor Magenta
        Write-Host "📋 类型: ${{ steps.branch_info.outputs.increment_type == 'minor' && '功能更新' || '修复更新' }}" -ForegroundColor Blue
        Write-Host "📥 安装包: ${{ steps.build_installer.outputs.installer_name }}" -ForegroundColor White
        Write-Host ""
        Write-Host "✅ 版本号已更新并提交到 main 分支"
        Write-Host "✅ 版本号已同步到 ${{ steps.branch_info.outputs.source_branch }} 分支"
        Write-Host "✅ 安装包已上传为 Artifact"
        Write-Host "============================================" -ForegroundColor Green

    - name: Rollback on failure
      if: failure()
      shell: powershell
      run: |
        Write-Host ""
        Write-Host "⚠️ 检测到流程失败，开始执行回滚..." -ForegroundColor Yellow

        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # 拉取最新远端状态
        git fetch origin 2>$null

        $mainSha     = "${{ steps.original_shas.outputs.main_sha }}"
        $devSha      = "${{ steps.original_shas.outputs.dev_sha }}"
        $bugfixSha   = "${{ steps.original_shas.outputs.bugfix_sha }}"
        $sourceBranch = "${{ steps.branch_info.outputs.source_branch }}"

        # --- 回滚 main ---
        if ($mainSha) {
            $currentMain = git rev-parse origin/main 2>$null
            if ($currentMain -and $currentMain -ne $mainSha) {
                Write-Host "↩️  回滚 main: $currentMain → $mainSha" -ForegroundColor Cyan
                git checkout -B main origin/main
                git reset --hard $mainSha
                git push --force origin main
                Write-Host "✅ main 已回滚" -ForegroundColor Green
            } else {
                Write-Host "ℹ️  main 无需回滚（未发生变更）"
            }
        }

        # --- 回滚源分支（dev / bugfix）---
        if ($sourceBranch -eq "dev" -and $devSha) {
            $currentDev = git rev-parse origin/dev 2>$null
            if ($currentDev -and $currentDev -ne $devSha) {
                Write-Host "↩️  回滚 dev: $currentDev → $devSha" -ForegroundColor Cyan
                git checkout -B dev origin/dev
                git reset --hard $devSha
                git push --force origin dev
                Write-Host "✅ dev 已回滚" -ForegroundColor Green
            } else {
                Write-Host "ℹ️  dev 无需回滚（未发生变更）"
            }
        }
        elseif ($sourceBranch -eq "bugfix" -and $bugfixSha) {
            $currentBugfix = git rev-parse origin/bugfix 2>$null
            if ($currentBugfix -and $currentBugfix -ne $bugfixSha) {
                Write-Host "↩️  回滚 bugfix: $currentBugfix → $bugfixSha" -ForegroundColor Cyan
                git checkout -B bugfix origin/bugfix
                git reset --hard $bugfixSha
                git push --force origin bugfix
                Write-Host "✅ bugfix 已回滚" -ForegroundColor Green
            } else {
                Write-Host "ℹ️  bugfix 无需回滚（未发生变更）"
            }
        }

        Write-Host ""
        Write-Host "❌ ================ 构建失败 ================" -ForegroundColor Red
        Write-Host "🔍 请检查以下可能的问题:" -ForegroundColor Yellow
        Write-Host "  - .NET 8.0 构建是否成功"
        Write-Host "  - InnoSetup 脚本是否正确"
        Write-Host "  - 版本号格式是否正确"
        Write-Host "  - GitHub Token 权限是否足够"
        Write-Host "==========================================" -ForegroundColor Red