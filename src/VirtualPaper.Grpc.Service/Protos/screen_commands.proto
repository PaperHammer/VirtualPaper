syntax = "proto3";
package VirtualPaper.Grpc.Service.ScrCommands;
import "google/protobuf/empty.proto";
import "Protos/common_models.proto";

service Grpc_ScrCommandsService {
	rpc Start (google.protobuf.Empty) returns (google.protobuf.Empty);
	rpc Stop (google.protobuf.Empty) returns (google.protobuf.Empty);
	rpc ChangeLockStatu(VirtualPaper.Grpc.Service.CommonModels.Grpc_LockData) returns (google.protobuf.Empty);
	rpc AddToWhiteList(VirtualPaper.Grpc.Service.CommonModels.Grpc_ProcInfoData) returns (google.protobuf.Empty);
	rpc RemoveFromWhiteList(VirtualPaper.Grpc.Service.CommonModels.Grpc_ProcInfoData) returns (google.protobuf.Empty);
}
