name: Dev Branch CI

# 当代码推送到 dev 分支时触发
on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  # 环境准备和构建
  build:
    name: Build Solution
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x

    - name: Restore dependencies
      run: dotnet restore src/VirtualPaper.sln

    - name: Build solution
      run: dotnet build src/VirtualPaper.sln --configuration Release --no-restore

    # 缓存构建结果供后续测试使用
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          src/*/bin/
          src/*/obj/
        retention-days: 1

  # Core 测试
  test-core:
    name: Core Tests
    runs-on: windows-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: src/

    - name: Run Core Tests
      run: dotnet test src/VirtualPaper.Core.Test/VirtualPaper.Core.Test.csproj --configuration Release --no-build --verbosity normal --logger trx --results-directory TestResults/Core
      continue-on-error: false

    - name: Upload Core test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-core
        path: TestResults/Core/
        retention-days: 7

  # UI 测试
  test-ui:
    name: UI Tests
    runs-on: windows-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: src/

    - name: Run UI Tests
      run: dotnet test src/VirtualPaper.UI.Test/VirtualPaper.UI.Test.csproj --configuration Release --no-build --verbosity normal --logger trx --results-directory TestResults/UI
      continue-on-error: false

    - name: Upload UI test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-ui
        path: TestResults/UI/
        retention-days: 7

  # ML 测试
  test-ml:
    name: ML Tests
    runs-on: windows-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: src/

    - name: Run ML Tests
      run: dotnet test src/VirtualPaper.ML.Test/VirtualPaper.ML.Test.csproj --configuration Release --no-build --verbosity normal --logger trx --results-directory TestResults/ML
      continue-on-error: false

    - name: Upload ML test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-ml
        path: TestResults/ML/
        retention-days: 7

  # Shader 测试
  test-shader:
    name: Shader Tests
    runs-on: windows-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: src/

    - name: Run Shader Tests
      run: dotnet test src/VirtualPaper.Shader.Test/VirtualPaper.Shader.Test.csproj --configuration Release --no-build --verbosity normal --logger trx --results-directory TestResults/Shader
      continue-on-error: false

    - name: Upload Shader test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-shader
        path: TestResults/Shader/
        retention-days: 7

  # 汇总测试结果和状态检查
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [build, test-core, test-ui, test-ml, test-shader]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        pattern: test-results-*
        merge-multiple: true
        path: TestResults/

    # 发布合并的测试结果
    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: All .NET Tests
        path: TestResults/**/*.trx
        reporter: dotnet-trx

    # 上传合并的测试结果
    - name: Upload combined test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-combined-${{ github.sha }}
        path: TestResults/
        retention-days: 30

    # 创建状态检查，用于后续PR验证
    - name: Create Status Check
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const github = require('@actions/github');
          const context = require('@actions/core');
          
          // 检查所有测试job的状态
          const jobStatuses = {
            'build': '${{ needs.build.result }}',
            'test-core': '${{ needs.test-core.result }}',
            'test-ui': '${{ needs.test-ui.result }}',
            'test-ml': '${{ needs.test-ml.result }}',
            'test-shader': '${{ needs.test-shader.result }}'
          };
          
          console.log('Job statuses:', jobStatuses);
          
          // 判断整体状态
          const allSuccess = Object.values(jobStatuses).every(status => status === 'success');
          const hasFailed = Object.values(jobStatuses).some(status => status === 'failure');
          
          let state, description;
          if (allSuccess) {
            state = 'success';
            description = 'All tests passed ✅';
          } else if (hasFailed) {
            state = 'failure';
            description = 'Some tests failed ❌';
          } else {
            state = 'pending';
            description = 'Tests in progress ⏳';
          }
          
          console.log('Final state:', state, description);
          
          await github.getOctokit(process.env.GITHUB_TOKEN).rest.repos.createCommitStatus({
            owner: process.env.GITHUB_REPOSITORY.split('/')[0],
            repo: process.env.GITHUB_REPOSITORY.split('/')[1],
            sha: process.env.GITHUB_SHA,
            state: state,
            target_url: process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID,
            description: description,
            context: 'ci/dev-tests'
          });