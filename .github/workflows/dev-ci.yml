name: Dev Branch CI

# 当代码推送到 dev 分支时触发
on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  run-tests:
    name: Run All Tests
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          6.0.x
          7.0.x
          8.0.x

    - name: Restore dependencies
      run: dotnet restore src/VirtualPaper.sln

    - name: Build solution
      run: dotnet build src/VirtualPaper.sln --configuration Release --no-restore

    # 运行第一个测试项目：VirtualPaper.Core.Test
    - name: Run Core Tests
      run: dotnet test src/VirtualPaper.Core.Test/VirtualPaper.Core.Test.csproj --configuration Release --no-build --verbosity normal --logger trx --results-directory TestResults
      continue-on-error: false

    # 运行第二个测试项目：VirtualPaper.UI.Test  
    - name: Run UI Tests
      run: dotnet test src/VirtualPaper.UI.Test/VirtualPaper.UI.Test.csproj --configuration Release --no-build --verbosity normal --logger trx --results-directory TestResults
      continue-on-error: false

    # 运行第三个测试项目：VirtualPaper.ML.Test
    - name: Run ML Tests
      run: dotnet test src/VirtualPaper.ML.Test/VirtualPaper.ML.Test.csproj --configuration Release --no-build --verbosity normal --logger trx --results-directory TestResults
      continue-on-error: false

    # 运行第四个测试项目：VirtualPaper.Shader.Test
    - name: Run Shader Tests
      run: dotnet test src/VirtualPaper.Shader.Test/VirtualPaper.Shader.Test.csproj --configuration Release --no-build --verbosity normal --logger trx --results-directory TestResults
      continue-on-error: false

    # 发布测试结果
    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: .NET Tests
        path: TestResults/*.trx
        reporter: dotnet-trx

    # 上传测试结果作为工件
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.sha }}
        path: TestResults/

    # 创建状态检查，用于后续PR验证
    - name: Create Status Check
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const { context, github } = require('@actions/github');
          const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
          const description = state === 'success' 
            ? 'All tests passed ✅' 
            : 'Some tests failed ❌';
          
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.sha,
            state: state,
            target_url: `${context.payload.repository.html_url}/actions/runs/${context.runId}`,
            description: description,
            context: 'ci/dev-tests'
          });